<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeeForMe</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  margin:0;
}
.container{
  background:white;
  margin-top:20px;
  padding:20px;
  width:95%;
  max-width:400px;
  border-radius:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  text-align:center;
}
video,img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
button{
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4CAF50;
  color:white;
  font-size:14px;
}
button:hover{
  opacity:0.9;
}
button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
</style>
</head>

<body>
<div class="container">
<h3>SeeForMe</h3>
<p id="status">Loading model...</p>

<input type="file" accept="image/*" id="upload">
<br>

<button onclick="startCamera()">Camera</button>
<button onclick="capture()">Capture</button>
<button onclick="analyze()" id="analyzeBtn" disabled>Analyze</button>

<video id="camera" autoplay playsinline style="display:none;"></video>
<img id="preview" style="display:none;">

</div>

<script>
let model;
let imageReady = false;
let currentStream = null;

/* ================= LOAD MODEL ================= */

async function loadModel(){
  await tf.setBackend('webgl');
  model = await mobilenet.load();
  document.getElementById("status").innerText = "Model Ready. Upload or use Camera.";
}
loadModel();

/* ================= UPLOAD IMAGE ================= */

document.getElementById("upload").addEventListener("change",(e)=>{
  const img = document.getElementById("preview");

  img.onload = () => {
    imageReady = true;
    document.getElementById("analyzeBtn").disabled = false;
    document.getElementById("status").innerText = "Image loaded. Ready to analyze.";
  };

  img.src = URL.createObjectURL(e.target.files[0]);
  img.style.display = "block";
  document.getElementById("camera").style.display = "none";
  
  if(currentStream){
    currentStream.getTracks().forEach(t => t.stop());
  }
});

/* ================= START CAMERA ================= */

async function startCamera(){
  try {
    if(currentStream){
      currentStream.getTracks().forEach(t => t.stop());
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" }
    });

    currentStream = stream;

    const video = document.getElementById("camera");
    video.srcObject = stream;
    video.style.display = "block";
    document.getElementById("preview").style.display = "none";
    document.getElementById("status").innerText = "Camera Active";

    await video.play();

    await new Promise(resolve=>{
      video.onloadedmetadata = resolve;
    });
  } catch (err) {
    console.error("Camera error: ", err);
    document.getElementById("status").innerText = "Camera access denied or unavailable.";
  }
}

/* ================= CAPTURE PHOTO ================= */

function capture(){
  const video = document.getElementById("camera");
  const img = document.getElementById("preview");

  // Check if video is actually streaming
  if (!video.srcObject || video.paused || video.ended) {
    alert("Camera is not active. Please start the camera first.");
    return;
  }

  // Create the canvas
  const canvas = document.createElement("canvas");
  
  // Use the actual video stream dimensions
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  
  // Draw the current frame
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Convert to data URL and update preview
  const dataUrl = canvas.toDataURL("image/jpeg", 1.0);
  img.src = dataUrl;
  
  // Update UI States
  img.style.display = "block";
  video.style.display = "none";
  imageReady = true;
  document.getElementById("analyzeBtn").disabled = false;
  document.getElementById("status").innerText = "Image Captured. Ready to analyze.";
}

/* ================= ANALYZE IMAGE ================= */

async function analyze(){
  if(!imageReady) return;

  document.getElementById("status").innerText = "Analyzing...";
  document.getElementById("analyzeBtn").disabled = true; // Disable while thinking

  const img = document.getElementById("preview");

  if(!img.complete){
    await new Promise(resolve => img.onload = resolve);
  }

  const predictions = await model.classify(img, 1);

  function simplify(label){
    label = label.toLowerCase();

    if(label.match(/cat|tabby|persian|siamese|tiger cat/)) return "cat";
    if(label.match(/dog|hound|retriever|shepherd|terrier|poodle|husky|bulldog|beagle/)) return "dog";
    if(label.match(/car|jeep|sports car|convertible/)) return "car";
    if(label.includes("bottle")) return "bottle";

    return label.split(",")[0].trim();
  }

  const simple = simplify(predictions[0].className);
  const response = "It is a " + simple + ".";

  document.getElementById("status").innerText = response;
  document.getElementById("analyzeBtn").disabled = false; // Re-enable
  speak(response);
}

/* ================= TEXT TO SPEECH ================= */

function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

</script>

</body>
</html>
