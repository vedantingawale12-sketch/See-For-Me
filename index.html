<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeeForMe</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
}
.container{
  background:white;
  margin-top:20px;
  padding:20px;
  width:95%;
  max-width:400px;
  border-radius:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  text-align:center;
}
video,img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
button{
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4CAF50;
  color:white;
}
button:hover{
  opacity:0.9;
}
</style>
</head>

<body>
<div class="container">
<h3>SeeForMe</h3>
<p id="status">Loading model...</p>

<input type="file" accept="image/*" id="upload">
<br>

<button onclick="startCamera()">Camera</button>
<button onclick="switchCamera()">Switch Camera</button>
<button onclick="capture()">Capture</button>
<button onclick="analyze()" id="analyzeBtn" disabled>Analyze</button>

<video id="camera" autoplay playsinline style="display:none;"></video>
<img id="preview">
</div>

<script>
let model;
let imageReady=false;
let currentStream=null;
let videoDevices=[];
let currentCameraIndex=0;

async function loadModel(){
  await tf.setBackend('webgl');
  model=await mobilenet.load();
  document.getElementById("status").innerText="Model Ready";
}
loadModel();

document.getElementById("upload").addEventListener("change",(e)=>{
  const img=document.getElementById("preview");
  img.src=URL.createObjectURL(e.target.files[0]);
  img.style.display="block";
  imageReady=true;
  document.getElementById("analyzeBtn").disabled=false;
});

async function startCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  if(videoDevices.length===0){
    const temp=await navigator.mediaDevices.getUserMedia({video:true});
    temp.getTracks().forEach(t=>t.stop());
    const devices=await navigator.mediaDevices.enumerateDevices();
    videoDevices=devices.filter(d=>d.kind==="videoinput");
  }

  const stream=await navigator.mediaDevices.getUserMedia({
    video:{
      deviceId: videoDevices[currentCameraIndex]?.deviceId
        ? {exact:videoDevices[currentCameraIndex].deviceId}
        : undefined
    }
  });

  currentStream=stream;
  const video=document.getElementById("camera");
  video.srcObject=stream;
  video.style.display="block";
  document.getElementById("preview").style.display="none";
  await video.play();
}

function switchCamera(){
  if(videoDevices.length>1){
    currentCameraIndex=(currentCameraIndex+1)%videoDevices.length;
    startCamera();
  }else{
    alert("Only one camera available");
  }
}

function capture(){
  const video=document.getElementById("camera");
  const canvas=document.createElement("canvas");

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const img=document.getElementById("preview");
  img.src=canvas.toDataURL();
  img.style.display="block";
  video.style.display="none";

  imageReady=true;
  document.getElementById("analyzeBtn").disabled=false;
}

async function analyze(){
  if(!imageReady) return;

  document.getElementById("status").innerText="Analyzing...";

  const img=document.getElementById("preview");

  // Get top 5 predictions
  const predictions=await model.classify(img,5);

  // FILTER LOW CONFIDENCE (IMPORTANT FIX)
  const filtered = predictions.filter(p => p.probability > 0.35);

  if(filtered.length === 0){
    document.getElementById("status").innerText="Not sure. Try again.";
    return;
  }

  function simplify(label){
    label=label.toLowerCase();

    if(label.match(/cat|tabby|persian|siamese|egyptian cat|tiger cat/))
      return "cat";

    if(label.match(/dog|hound|shepherd|retriever|mastiff|terrier|spaniel|bulldog|beagle|husky|kuvasz|poodle/))
      return "dog";

    if(label.match(/car|jeep|sports car|convertible/))
      return "car";

    if(label.includes("bottle"))
      return "bottle";

    return label.split(",")[0].trim();
  }

  let scores={};

  filtered.forEach(p=>{
    const simple=simplify(p.className);
    scores[simple]=(scores[simple]||0)+p.probability;
  });

  let finalObject=Object.keys(scores).reduce((a,b)=>
    scores[a]>scores[b]?a:b
  );

  const response="It is a "+finalObject+".";
  document.getElementById("status").innerText=response;
  speak(response);
}

function speak(text){
  const msg=new SpeechSynthesisUtterance(text);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}
</script>
</body>
</html>
