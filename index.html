<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeeForMe</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  margin:0;
}
.container{
  background:white;
  margin-top:20px;
  padding:20px;
  width:95%;
  max-width:400px;
  border-radius:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  text-align:center;
}
video,img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
button{
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4CAF50;
  color:white;
  font-size:14px;
}
button:hover{
  opacity:0.9;
}
</style>
</head>

<body>
<div class="container">
<h3>SeeForMe</h3>
<p id="status">Loading model...</p>

<input type="file" accept="image/*" id="upload">
<br>

<button onclick="startCamera()">Camera</button>
<button onclick="capture()">Capture</button>
<button onclick="analyze()" id="analyzeBtn" disabled>Analyze</button>

<video id="camera" autoplay playsinline style="display:none;"></video>
<img id="preview">

</div>

<script>

let model;
let imageReady=false;
let currentStream=null;

async function loadModel(){
  await tf.setBackend('webgl');
  model = await mobilenet.load();
  document.getElementById("status").innerText="Model Ready";
}
loadModel();

/* ================= UPLOAD ================= */

document.getElementById("upload").addEventListener("change",(e)=>{
  const img=document.getElementById("preview");

  img.onload = () => {
    imageReady=true;
    document.getElementById("analyzeBtn").disabled=false;
  };

  img.src=URL.createObjectURL(e.target.files[0]);
  img.style.display="block";
});

/* ================= CAMERA ================= */

async function startCamera(){

  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });

  currentStream = stream;

  const video=document.getElementById("camera");
  video.srcObject=stream;
  video.style.display="block";
  document.getElementById("preview").style.display="none";

  await video.play();

  await new Promise(resolve=>{
    video.onloadedmetadata=resolve;
  });
}

/* ================= CAPTURE ================= */

function capture(){

  const video=document.getElementById("camera");

  if(video.videoWidth===0 || video.videoHeight===0){
    alert("Camera not ready. Try again.");
    return;
  }

  const canvas=document.createElement("canvas");

  // ✅ USE FULL RESOLUTION
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const img=document.getElementById("preview");

  img.onload = () => {
    imageReady=true;
    document.getElementById("analyzeBtn").disabled=false;
  };

  // ✅ MAX QUALITY
  img.src=canvas.toDataURL("image/jpeg",1.0);

  img.style.display="block";
  video.style.display="none";
}

/* ================= ANALYZE ================= */

async function analyze(){

  if(!imageReady) return;

  document.getElementById("status").innerText="Analyzing...";

  const img=document.getElementById("preview");

  if(!img.complete){
    await new Promise(resolve=>img.onload=resolve);
  }

  const predictions = await model.classify(img,1);

  function simplify(label){

    label=label.toLowerCase();

    if(label.match(/cat|tabby|persian|siamese|tiger cat/))
      return "cat";

    if(label.match(/dog|hound|retriever|shepherd|terrier|poodle|husky|bulldog|beagle/))
      return "dog";

    if(label.match(/car|jeep|sports car|convertible/))
      return "car";

    if(label.includes("bottle"))
      return "bottle";

    return label.split(",")[0].trim();
  }

  const simple = simplify(predictions[0].className);
  const confidence = (predictions[0].probability * 100).toFixed(1);

  const response = "It is a " + simple + 
                   " (" + confidence + "% sure).";

  document.getElementById("status").innerText = response;
  speak(response);
}

/* ================= SPEAK ================= */

function speak(text){
  const msg=new SpeechSynthesisUtterance(text);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

</script>

</body>
</html>
