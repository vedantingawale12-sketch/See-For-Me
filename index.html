<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeeForMe AI</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; width: 100%; max-width: 420px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h3 { color: #333; margin-bottom: 10px; }
        #status { font-weight: bold; color: #555; margin-bottom: 15px; min-height: 1.2em; }
        video, img { width: 100%; border-radius: 12px; margin-top: 10px; border: 2px solid #eee; }
        .controls { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; background: #4CAF50; color: white; font-size: 15px; font-weight: 600; transition: 0.2s; }
        button:hover { background: #45a049; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #analyzeBtn { grid-column: span 2; background: #2196F3; }
        #analyzeBtn:hover { background: #1976D2; }
        input[type="file"] { margin-bottom: 10px; width: 100%; }
    </style>
</head>

<body>
<div class="container">
    <h3>SeeForMe</h3>
    <p id="status">Initializing AI...</p>

    <input type="file" accept="image/*" id="upload">
    
    <video id="camera" autoplay playsinline style="display:none;"></video>
    <img id="preview" style="display:none;">

    <div class="controls">
        <button onclick="startCamera()">Start Camera</button>
        <button onclick="capture()">Capture Photo</button>
        <button onclick="analyze()" id="analyzeBtn" disabled>Analyze Object</button>
    </div>
</div>

<script>
let model;
let currentStream = null;
let imageSource = null; // This will hold either the <img> or the <canvas>

/* 1. LOAD MODEL (With WebGL acceleration) */
async function loadModel() {
    try {
        await tf.ready();
        model = await mobilenet.load();
        document.getElementById("status").innerText = "Ready! Upload or use Camera.";
    } catch (e) {
        document.getElementById("status").innerText = "Error loading AI model.";
    }
}
loadModel();

/* 2. HANDLE UPLOAD */
document.getElementById("upload").addEventListener("change", (e) => {
    const img = document.getElementById("preview");
    const reader = new FileReader();
    
    reader.onload = (f) => {
        img.src = f.target.result;
        img.style.display = "block";
        document.getElementById("camera").style.display = "none";
        
        // Stop camera if it was running
        if(currentStream) currentStream.getTracks().forEach(t => t.stop());
        
        img.onload = () => {
            imageSource = img; // Set the source to the image element
            document.getElementById("analyzeBtn").disabled = false;
            document.getElementById("status").innerText = "Image loaded. Ready.";
        };
    };
    reader.readAsDataURL(e.target.files[0]);
});

/* 3. START CAMERA (Environment/Back facing) */
async function startCamera() {
    try {
        if(currentStream) currentStream.getTracks().forEach(t => t.stop());

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        currentStream = stream;
        const video = document.getElementById("camera");
        video.srcObject = stream;
        video.style.display = "block";
        document.getElementById("preview").style.display = "none";
        document.getElementById("status").innerText = "Camera Active";
        
        // IMPORTANT: Ensure video metadata is loaded before trying to play
        video.onloadedmetadata = () => video.play();
    } catch (err) {
        document.getElementById("status").innerText = "Camera access denied.";
    }
}

/* 4. CAPTURE PHOTO (Using Canvas to avoid blank frames) */
function capture() {
    const video = document.getElementById("camera");
    const img = document.getElementById("preview");

    if (!video.srcObject) {
        alert("Please start the camera first!");
        return;
    }

    // Create a temporary canvas to grab the frame
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Show the static image to the user
    img.src = canvas.toDataURL("image/jpeg");
    img.style.display = "block";
    video.style.display = "none";

    // IMPORTANT: We use the CANVAS as the source for the AI
    // This is much faster and more reliable than the <img> tag
    imageSource = canvas; 
    
    document.getElementById("analyzeBtn").disabled = false;
    document.getElementById("status").innerText = "Captured! Ready to analyze.";
}

/* 5. ANALYZE IMAGE (With Memory Cleanup) */
async function analyze() {
    if (!imageSource) return;

    const btn = document.getElementById("analyzeBtn");
    const status = document.getElementById("status");

    status.innerText = "Thinking...";
    btn.disabled = true;

    // Use tf.tidy to prevent memory leaks on mobile devices
    const predictions = await tf.tidy(async () => {
        return await model.classify(imageSource, 1);
    });

    if (predictions && predictions.length > 0) {
        const result = simplify(predictions[0].className);
        const text = "It is a " + result + ".";
        status.innerText = text;
        speak(text);
    }

    btn.disabled = false;
}

/* 6. HELPERS */
function simplify(label) {
    label = label.toLowerCase();
    if (label.match(/cat|tabby|siamese/)) return "cat";
    if (label.match(/dog|hound|retriever|terrier/)) return "dog";
    if (label.match(/phone|iphone|cellular/)) return "smartphone";
    if (label.includes("bottle")) return "bottle";
    return label.split(",")[0].trim();
}

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);
}
</script>
</body>
</html>
