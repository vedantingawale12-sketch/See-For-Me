<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeeForMe</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  margin:0;
}
.container{
  background:white;
  margin-top:20px;
  padding:20px;
  width:95%;
  max-width:400px;
  border-radius:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  text-align:center;
}
video,img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
button{
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4CAF50;
  color:white;
  font-size:14px;
}
button:hover{
  opacity:0.9;
}
</style>
</head>

<body>
<div class="container">
<h3>SeeForMe</h3>
<p id="status">Loading model...</p>

<input type="file" accept="image/*" id="upload">
<br>

<button onclick="startCamera()">Camera</button>
<button onclick="switchCamera()">Switch Camera</button>
<button onclick="capture()">Capture</button>
<button onclick="analyze()" id="analyzeBtn" disabled>Analyze</button>

<video id="camera" autoplay playsinline style="display:none;"></video>
<img id="preview">
</div>

<script>
let model;
let imageReady=false;
let currentStream=null;
let videoDevices=[];
let currentCameraIndex=0;

async function loadModel(){
  await tf.setBackend('webgl');
  model=await mobilenet.load();
  document.getElementById("status").innerText="Model Ready";
}
loadModel();

document.getElementById("upload").addEventListener("change",(e)=>{
  const img=document.getElementById("preview");
  img.onload = () => {
    imageReady=true;
    document.getElementById("analyzeBtn").disabled=false;
  };
  img.src=URL.createObjectURL(e.target.files[0]);
  img.style.display="block";
});

async function startCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  const stream=await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" } // 🔥 forces back camera
  });

  currentStream=stream;
  const video=document.getElementById("camera");
  video.srcObject=stream;
  video.style.display="block";
  document.getElementById("preview").style.display="none";

  await video.play();

  // 🔥 wait until camera has real size
  await new Promise(resolve=>{
    video.onloadedmetadata=resolve;
  });
}

function switchCamera(){
  alert("Using default back camera for stability.");
}

function capture(){
  const video=document.getElementById("camera");

  if(video.videoWidth===0 || video.videoHeight===0){
    alert("Camera not ready. Try again.");
    return;
  }

  const canvas=document.createElement("canvas");

  // 🔥 Force stable size
  canvas.width=224;
  canvas.height=224;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0,224,224);

  const img=document.getElementById("preview");

  img.onload = () => {
    imageReady=true;
    document.getElementById("analyzeBtn").disabled=false;
  };

  img.src=canvas.toDataURL("image/jpeg",0.95);
  img.style.display="block";
  video.style.display="none";
}

async function analyze(){
  if(!imageReady) return;

  document.getElementById("status").innerText="Analyzing...";

  const img=document.getElementById("preview");

  // ensure image fully loaded
  if(!img.complete){
    await new Promise(resolve=>img.onload=resolve);
  }

  const predictions=await model.classify(img,1);

  function simplify(label){
    label=label.toLowerCase();

    if(label.match(/cat|tabby|persian|siamese|egyptian cat|tiger cat/))
      return "cat";

    if(label.match(/dog|hound|shepherd|retriever|mastiff|terrier|spaniel|bulldog|beagle|husky|kuvasz|poodle/))
      return "dog";

    if(label.match(/car|jeep|sports car|convertible/))
      return "car";

    if(label.includes("bottle"))
      return "bottle";

    return label.split(",")[0].trim();
  }

  const simple=simplify(predictions[0].className);

  const response="It is a "+simple+".";
  document.getElementById("status").innerText=response;
  speak(response);
}

function speak(text){
  const msg=new SpeechSynthesisUtterance(text);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}
</script>

</body>
</html>
